<!DOCTYPE html>
<html>
<head>
  <title>For You 💜</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle, #0f0c29, #1a0033, #000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      padding: 25px;
      border-radius: 25px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(147,51,234,0.5);
      animation: fadeIn 0.6s;
    }

    h1 { color: #c084fc; }

    button {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      color: white;
      cursor: pointer;
    }

    .small-btn {
      padding: 8px 16px;
      font-size: 12px;
      background: linear-gradient(135deg, #7c3aed, #000);
    }

    .hidden { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .card {
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      font-size: 40px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #a855f7;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<audio id="bgSong" loop>
  <source src="song.mp3">
</audio>

<!-- LOGIN -->
<div class="container" id="loginPage">
  <h1>💜</h1>
  <input type="password" id="password" placeholder="Enter callsign">
  <button onclick="login()">Enter</button>
</div>

<!-- GREETING -->
<div class="container hidden" id="greetPage">
  <h1>Hi my love 💜</h1>
  <p>Do you want to see your gift?</p>
  <button onclick="goMenu()">Yes please 💜</button>
  <button onclick="alert('No choice 😭💜')">No thanks</button>
</div>

<!-- MENU -->
<div class="container hidden" id="menuPage">
  <h1>This present is for you 💜</h1>

  <div class="grid">
    <div class="card" onclick="startSong()"><i class="fa-solid fa-music"></i></div>
    <div class="card" onclick="openPage('photos')"><i class="fa-solid fa-image"></i></div>
    <div class="card" onclick="openPage('letter')"><i class="fa-solid fa-envelope"></i></div>
    <div class="card" onclick="openPage('special')"><i class="fa-solid fa-lock"></i></div>
  </div>
</div>

<!-- SONG -->
<div class="container hidden" id="songPage">
  <h1>THIS SONG REMINDS ME OF YOU 💜</h1>
  <img src="songpic.jpg">
  <button class="small-btn" onclick="goBack()">⟵ Return</button>
</div>

<!-- PHOTOS -->
<div class="container hidden" id="photos">
  <h1>JUST US! 💜</h1>

  <img src="pic1.jpg"><img src="pic2.jpg"><img src="pic3.jpg">
  <img src="pic4.jpg"><img src="pic5.jpg"><img src="pic6.jpg">
  <img src="pic7.jpg"><img src="pic8.jpg"><img src="pic9.jpg">
  <img src="pic10.jpg">

  <button class="small-btn" onclick="goBack()">⟵ Return</button>
</div>

<!-- LETTER -->
<div class="container hidden" id="letter">
  <h1>MY LSM FOR YOU! 💜</h1>
  <p id="typeText"></p>
  <button class="small-btn" onclick="goBack()">⟵ Return</button>
</div>

<!-- SPECIAL -->
<div class="container hidden" id="special">
  <h1>🔐</h1>
  <p>Do you want to continue?</p>
  <button onclick="showPin()">Yes 💜</button>
</div>

<!-- PIN -->
<div class="container hidden" id="pinPage">
  <h1>Enter PIN 🔐</h1>
  <p>Clue: today’s date 💜</p>

  <p id="pinDisplay">----</p>

  <div>
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button><br>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button><br>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button><br>
    <button onclick="clearPin()">C</button>
    <button onclick="press(0)">0</button>
  </div>
</div>

<!-- FINAL -->
<div class="container hidden" id="finalPage">
  <h1>💜</h1>
  <p>Marked this day as our anniversary 💜</p>
  <button class="small-btn" onclick="goBack()">⟵ Return</button>
</div>

<script>
let pinInput="";
let i=0;

function login(){
  if(password.value==="love"){
    loginPage.classList.add("hidden");
    greetPage.classList.remove("hidden");
  }
}

function goMenu(){
  document.querySelectorAll('.container').forEach(el=>el.classList.add("hidden"));
  menuPage.classList.remove("hidden");
}

function startSong(){
  document.getElementById("bgSong").play();
  openPage('songPage');
}

function openPage(page){
  document.querySelectorAll('.container').forEach(el=>el.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");

  if(page==="letter") startTyping();
}

function goBack(){
  document.querySelectorAll('.container').forEach(el=>el.classList.add("hidden"));
  menuPage.classList.remove("hidden");
}

function showPin(){
  special.classList.add("hidden");
  pinPage.classList.remove("hidden");
}

function press(num){
  if(pinInput.length<4){
    pinInput+=num;
    pinDisplay.innerText=pinInput;
  }
  if(pinInput==="0409"){
    pinPage.classList.add("hidden");
    finalPage.classList.remove("hidden");
  }
}

function clearPin(){
  pinInput="";
  pinDisplay.innerText="----";
}

/* typing */
const msg="You are my everything... I love you so much 💜";
function startTyping(){
  if(i<msg.length){
    typeText.innerHTML+=msg.charAt(i);
    i++;
    setTimeout(startTyping,50);
  }
}
</script>

</body>
</html>
