<!DOCTYPE html>
<html>
<head>
  <title>For You 💜</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle, #0f0c29, #1a0033, #000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      padding: 25px;
      border-radius: 25px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(147,51,234,0.5);
      animation: fadeIn 0.6s;
    }

    h1 {
      color: #c084fc;
      text-shadow: 0 0 10px #a855f7;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    button {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.07);
      box-shadow: 0 0 20px #a855f7;
    }

    .small-btn {
      padding: 8px 16px;
      font-size: 12px;
      background: linear-gradient(135deg, #7c3aed, #000);
    }

    .hidden { display: none; }

    /* ❤️ FLOATING HEARTS */
    .heart {
      position: fixed;
      color: red;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh);}
      to { transform: translateY(-10vh);}
    }

    /* 🎁 CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .card {
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: 0.4s;
      font-size: 40px;
    }

    .card:hover {
      transform: scale(1.15) rotate(2deg);
      box-shadow: 0 0 30px #a855f7;
    }

    /* 💓 HEARTBEAT */
    .beat {
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1);}
      50% { transform: scale(1.2);}
      100% { transform: scale(1);}
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
      animation: fadeIn 1s;
    }

    /* 🔢 PIN */
    .keypad button {
      width: 60px;
      height: 60px;
      font-size: 18px;
    }

    /* 🎉 CONFETTI */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: red;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-10vh);}
      to { transform: translateY(100vh);}
    }
  </style>
</head>

<body>

<audio id="bgSong" loop>
  <source src="song.mp3">
</audio>

<!-- ❤️ HEARTS -->
<script>
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
</script>

<!-- LOGIN -->
<div class="container" id="loginPage">
  <h1>💜</h1>
  <input type="password" id="password">
  <button onclick="login()">Enter</button>
</div>

<!-- GREETING -->
<div class="container hidden" id="greetPage">
  <h1 class="beat">Hi my love 💜</h1>
  <p>Do you want to see your gift?</p>
  <button onclick="goMenu()">Yes please 💜</button>
  <button id="noBtn" onmouseover="moveBtn()">No thanks</button>
</div>

<!-- MENU -->
<div class="container hidden" id="menuPage">
  <div class="grid">
    <div class="card" onclick="startSong()"><i class="fa-solid fa-music"></i></div>
    <div class="card" onclick="openPage('photos')"><i class="fa-solid fa-image"></i></div>
    <div class="card" onclick="openPage('letter')"><i class="fa-solid fa-envelope"></i></div>
    <div class="card" onclick="openPage('special')"><i class="fa-solid fa-lock"></i></div>
  </div>
</div>

<!-- SONG -->
<div class="container hidden" id="songPage">
  <img src="songpic.jpg">
  <button class="small-btn" onclick="goBack()">⟵</button>
</div>

<!-- PHOTOS -->
<div class="container hidden" id="photos">
  <img src="pic1.jpg"><img src="pic2.jpg"><img src="pic3.jpg">
  <img src="pic4.jpg"><img src="pic5.jpg"><img src="pic6.jpg">
  <img src="pic7.jpg"><img src="pic8.jpg"><img src="pic9.jpg">
  <img src="pic10.jpg">
  <button class="small-btn" onclick="goBack()">⟵</button>
</div>

<!-- LETTER -->
<div class="container hidden" id="letter">
  <p id="typeText"></p>
  <button class="small-btn" onclick="goBack()">⟵</button>
</div>

<!-- SPECIAL -->
<div class="container hidden" id="special">
  <button onclick="showPin()">Continue 💜</button>
</div>

<!-- PIN -->
<div class="container hidden" id="pinPage">
  <p id="pinDisplay">----</p>
  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button><br>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button><br>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button><br>
    <button onclick="clearPin()">C</button>
    <button onclick="press(0)">0</button>
  </div>
</div>

<!-- FINAL -->
<div class="container hidden" id="finalPage">
  <h1 class="beat">💜</h1>
  <p>Marked this day as our anniversary 💜</p>
  <button class="small-btn" onclick="goBack()">⟵</button>
</div>

<script>
let pinInput="";

/* LOGIN */
function login(){
  if(password.value==="love"){
    loginPage.classList.add("hidden");
    greetPage.classList.remove("hidden");
  }
}

/* RUN AWAY BUTTON */
function moveBtn(){
  let btn=noBtn;
  btn.style.position="absolute";
  btn.style.top=Math.random()*300+"px";
  btn.style.left=Math.random()*300+"px";
}

/* MUSIC */
function startSong(){
  bgSong.play();
  openPage('songPage');
}

/* NAVIGATION */
function openPage(page){
  document.querySelectorAll('.container').forEach(el=>el.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");

  if(page==="letter") startTyping();
}

function goBack(){
  document.querySelectorAll('.container').forEach(el=>el.classList.add("hidden"));
  menuPage.classList.remove("hidden");
}

/* PIN */
function showPin(){
  special.classList.add("hidden");
  pinPage.classList.remove("hidden");
}

function press(num){
  if(pinInput.length<4){
    pinInput+=num;
    pinDisplay.innerText=pinInput;
  }
  if(pinInput==="0409"){
    pinPage.classList.add("hidden");
    finalPage.classList.remove("hidden");
    confetti();
  }
}

function clearPin(){
  pinInput="";
  pinDisplay.innerText="----";
}

/* 💌 TYPING */
const msg="You are my everything... I love you so much 💜";
let i=0;
function startTyping(){
  if(i<msg.length){
    typeText.innerHTML+=msg.charAt(i);
    i++;
    setTimeout(startTyping,50);
  }
}

/* 🎉 CONFETTI */
function confetti(){
  for(let i=0;i<100;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* SECRET */
document.body.addEventListener("dblclick",()=>{
  alert("I love you endlessly 💜🥺");
});
</script>

</body>
</html>
